<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Eduardo Passos</title>

    <style>
        :root {
            --color-snow: #FAFAFA;
            --color-primary: #403774;
            --color-accent: #ba5624;
            --color-dark: #000000;
        }
    </style>
</head>
<body>
    <div class="bg-[#001736] h-dvh pt-10">
        <div class="mx-auto max-w-3xl flex flex-col gap-5 border-2 p-5 border-gray-300 rounded-lg bg-white shadow-md shadow-black">
            
            <div class="flex">
                <section class="flex flex-col gap-3 max-w-[420px]">
                    
                    <h1 class="text-4xl font-semibold">Ola, sou Eduardo!👋</h1>
                
                    <p class="text-balance">Tenho 17 anos, sou estudante de ADS no 3° ano do ensino médio e sou brasileiro.</p>
                
                    <p class="text-balance">Amo programar uma solução para qualquer problema do dia-a-dia.</p>

                    <section class="flex gap-4">
                        <p class="font-semibold">Entre em contato:</p>
                        <section class="flex gap-3">
                            <a href="https://github.com/TinhoFZ">
                                <img src="./assets/images/github.png" alt="Github" class="size-[24px]"></img>
                            </a>
                            <a href=""> 
                                <img src="./assets/images/linkedin.png" alt="LinkedIn" class="size-[24px]"></img>
                            </a>

                        </section>
                        
                    </section>
                </section>

                <div class="ml-auto">
                    <img src="./assets/images/eduardo.png" alt="Eduardo Passos" class="h-[250px] rounded-lg">
                </div>
            </div>

            <section>
                <section id="skill-button-container" class="grid grid-cols-2 p-1 border-2">
                    <button id="current-skill" class="rounded-md h-[70%] bg-white text-black border-2 border-black m-2 hover:bg-[var(--color-dark)] hover:text-white hover:border-white">Habilidades</button>
                    <button id="learning-skill" class="rounded-md h-[70%] bg-white text-black border-2 border-black m-2 hover:bg-[var(--color-dark)] hover:text-white hover:border-white">Aprendendo</button>
                </section>
                <div id="skill-container" class="border-2 w-100 h-fit p-3 hidden"></div>
            </section>

        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
